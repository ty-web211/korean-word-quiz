<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Korean Word Quiz</title>

<style>

*{
 box-sizing:border-box;
 font-family:Arial,sans-serif;
}

body{
 margin:0;
 height:100vh;
 display:flex;
 justify-content:center;
 align-items:center;
 background:linear-gradient(135deg,#667eea,#764ba2);
}

.container{
 width:90%;
 max-width:420px;
 background:white;
 border-radius:25px;
 padding:30px;
 text-align:center;
 box-shadow:0 15px 30px rgba(0,0,0,.2);
}


h1{
 font-size:28px;
}


.wheel{
 font-size:70px;
 margin:20px;
}


.card{

 background:#f5f5f5;
 padding:35px;
 border-radius:20px;
 font-size:32px;
 font-weight:bold;

}


.meaning{

 margin-top:20px;
 font-size:22px;
 color:#666;

}


.hidden{
 display:none;
}


button{

 border:none;
 padding:12px 20px;
 margin:8px;
 border-radius:20px;
 background:#764ba2;
 color:white;
 font-size:16px;

}


.progress{

 margin-top:20px;

}


.bar-box{

 height:12px;
 background:#ddd;
 border-radius:20px;
 margin-top:10px;

}


#bar{

 height:12px;
 width:0%;
 background:#764ba2;
 border-radius:20px;

}


</style>

</head>


<body>


<div class="container">


<h1>🍀 Korean Word Quiz</h1>


<div class="wheel">
🎡
</div>



<div class="card">

<div id="word">
준비
</div>


<div id="meaning" class="meaning hidden">

</div>


</div>



<button onclick="startQuiz()">
🎯 시작
</button>


<button onclick="showMeaning()">
💡 뜻 보기
</button>


<button onclick="speak()">
🔊 발음
</button>


<button onclick="nextWord()">
➡️ 다음
</button>



<div class="progress">

학습:
<span id="count">0</span> /
<span id="total">0</span>


<div class="bar-box">

<div id="bar"></div>

</div>


</div>



</div>



<script>


const words=[

["사랑","爱"],

["학교","学校"],

["친구","朋友"],

["책","书"],

["물","水"],

["밥","饭"],

["고양이","猫"],

["강아지","狗"],

["행복","幸福"]

];



let index=0;

let started=false;

let count=0;



document.getElementById("total").innerText=words.length;



function startQuiz(){

 started=true;

 nextWord();

}



function nextWord(){


if(!started){

return;

}


index=Math.floor(Math.random()*words.length);



document.getElementById("word").innerText=
words[index][0];



document.getElementById("meaning").innerText=
words[index][1];



document.getElementById("meaning")
.classList.add("hidden");



count++;


document.getElementById("count").innerText=count;



let percent=(count/words.length)*100;


document.getElementById("bar").style.width=
percent+"%";


}




function showMeaning(){


document.getElementById("meaning")
.classList.remove("hidden");


}




function speak(){


let text=
document.getElementById("word").innerText;



let speech=
new SpeechSynthesisUtterance(text);



speech.lang="ko-KR";


speechSynthesis.speak(speech);


}



</script>


</body>

</html>
