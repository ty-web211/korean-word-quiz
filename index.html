<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>오늘의 메뉴 추천기</title>
</head>

<body style="text-align:center; font-family:sans-serif; margin-top:100px;">

<h1>🍔 오늘의 메뉴 추천기 🍕</h1>

<button onclick="menu()">메뉴 추천받기</button>

<h2 id="result">버튼을 눌러보세요!</h2>

<script>
function menu(){
const menus=[
"치킨",
"피자",
"햄버거",
"돈까스",
"김밥",
"떡볶이",
"마라탕"
];

const random=menus[Math.floor(Math.random()*menus.length)];
document.getElementById("result").innerHTML=random;
}
</script>

</body>
</html>
