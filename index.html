<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>한국어 단어 퀴즈</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI',sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:linear-gradient(135deg,#667eea,#764ba2);
    padding:20px;
}

.container{
    width:100%;
    max-width:650px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(15px);
    border-radius:25px;
    padding:40px;
    text-align:center;
    color:white;
    box-shadow:0 8px 32px rgba(0,0,0,0.2);
}

h1{
    font-size:32px;
    margin-bottom:20px;
}

.subtitle{
    opacity:0.9;
    margin-bottom:30px;
}

.word{
    font-size:55px;
    font-weight:bold;
    margin:30px 0;
}

#meaning{
    font-size:22px;
    min-height:40px;
    margin-bottom:25px;
}

button{
    border:none;
    border-radius:50px;
    padding:14px 30px;
    font-size:17px;
    cursor:pointer;
    margin:8px;
    transition:0.3s;
}

button:hover{
    transform:translateY(-3px);
}

.show{
    background:#22c55e;
    color:white;
}

.next{
    background:#3b82f6;
    color:white;
}

.score-box{
    margin-top:30px;
    background:rgba(255,255,255,0.15);
    padding:20px;
    border-radius:15px;
}

.score{
    font-size:22px;
    margin-bottom:15px;
}

.progress{
    width:100%;
    height:14px;
    background:rgba(255,255,255,0.2);
    border-radius:20px;
    overflow:hidden;
}

.bar{
    height:100%;
    width:0%;
    background:white;
    transition:0.5s;
}

.complete{
    margin-top:15px;
    font-size:18px;
    color:#ffe082;
    font-weight:bold;
}

</style>
</head>

<body>

<div class="container">

<h1>📚 한국어 단어 퀴즈</h1>

<p class="subtitle">
📖 한국어 학습 플랫폼에 오신 것을 환영합니다.
</p>

<div class="word" id="word">
시작하기
</div>

<p id="meaning">
버튼을 눌러 시작하세요.
</p>

<button class="show" onclick="showMeaning()">
뜻 보기
</button>

<button class="next" onclick="nextWord()">
다음 단어
</button>

<div class="score-box">

<div class="score">
학습한 단어 수 : <span id="count">0</span>
</div>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div class="complete" id="complete"></div>

</div>

</div>

<script>

const words = [
{word:"사랑", meaning:"爱情"},
{word:"희망", meaning:"希望"},
{word:"행복", meaning:"幸福"},
{word:"문화", meaning:"文化"},
{word:"전통", meaning:"传统"},
{word:"우정", meaning:"友情"},
{word:"미래", meaning:"未来"},
{word:"감동", meaning:"感动"},
{word:"자유", meaning:"自由"},
{word:"문학", meaning:"文学"}
];

let current;
let count = 0;

function nextWord(){

    current = words[Math.floor(Math.random()*words.length)];

    document.getElementById("word").innerText = current.word;

    document.getElementById("meaning").innerText =
    "뜻을 맞혀보세요!";

    count++;

    document.getElementById("count").innerText = count;

    let progress = Math.min((count/10)*100,100);

    document.getElementById("bar").style.width =
    progress + "%";

    if(count >= 10){
        document.getElementById("complete").innerText =
        "🎉 학습 완료!";
    }
}

function showMeaning(){

    if(current){
        document.getElementById("meaning").innerText =
        current.meaning;
    }
}

</script>

</body>
</html>
