<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍀 Korean Word Quiz Deluxe</title>

<style>
*{
 box-sizing:border-box;
 font-family:"Pretendard","Arial",sans-serif;
}

body{
 margin:0;
 min-height:100vh;
 background:linear-gradient(135deg,#667eea,#764ba2);
 display:flex;
 justify-content:center;
 align-items:center;
 color:white;
}

.container{
 width:90%;
 max-width:430px;
 background:rgba(255,255,255,0.15);
 backdrop-filter:blur(15px);
 border-radius:25px;
 padding:30px;
 text-align:center;
 box-shadow:0 20px 40px rgba(0,0,0,.25);
}

h1{
 font-size:28px;
 margin-bottom:20px;
}

.score{
 display:flex;
 justify-content:space-between;
 margin-bottom:20px;
 font-size:15px;
}

.card{
 background:white;
 color:#333;
 border-radius:20px;
 padding:35px 20px;
 margin:20px 0;
 font-size:32px;
 font-weight:bold;
 animation:pop .4s;
}

@keyframes pop{
 from{
  transform:scale(.8);
  opacity:0;
 }
 to{
  transform:scale(1);
  opacity:1;
 }
}

.meaning{
 font-size:20px;
 margin-top:15px;
 color:#555;
}

button{
 border:none;
 padding:14px 20px;
 margin:8px;
 border-radius:30px;
 font-size:16px;
 cursor:pointer;
 background:white;
 color:#764ba2;
 font-weight:bold;
 transition:.3s;
}

button:hover{
 transform:scale(1.08);
}

#wheel{
 display:flex;
 justify-content:center;
 align-items:center;
 height:120px;
}

.wheel{
 font-size:80px;
}

@keyframes rotate{
 from{transform:rotate(0)}
 to{transform:rotate(360deg)}
}

.hidden{
 display:none;
}

.progress{
 margin-top:15px;
 font-size:14px;
}

</style>
</head>


<body>

<div class="container">

<h1>🍀 Korean Word Quiz</h1>


<div id="wheel">
  <div class="wheel">🎡</div>
</div>

<div class="card" onclick="showMeaning()">
<div id="word">준비</div>

<div id="meaning" class="meaning hidden">
</div>

<p style="font-size:14px;color:#888">
👇 클릭해서 뜻 보기
</p>

</div>

<button onclick="startQuiz()">
🎯 시작
</button>

<button onclick="showMeaning()">
💡 뜻 보기
</button>

<button onclick="speak()">
🔊 발음
</button>

<button onclick="nextWord()">
➡️ 다음
</button>


<div style="margin-top:15px;background:#ddd;border-radius:20px;height:12px;">
<div id="bar"
style="height:12px;width:0%;background:#764ba2;border-radius:20px;">
</div>
</div>


</div>
<script>

const words = [
 ["사랑","爱"],
 ["학교","学校"],
 ["친구","朋友"],
 ["책","书"],
 ["물","水"],
 ["밥","饭"],
 ["고양이","猫"],
 ["강아지","狗"],
 ["행복","幸福"],
 ["여행","旅行"]
];


let index=0;
let score=0;
let streak=0;
let started=false;


document.getElementById("total").innerText=words.length;



function startQuiz(){

 started=true;

 document.getElementById("wheel").style.display="none";

 nextWord();

}



function nextWord(){

 if(!started){
  return;
 }


 index=Math.floor(Math.random()*words.length);


 document.getElementById("word").innerText=
 words[index][0];


 document.getElementById("meaning").classList.add("hidden");


 document.getElementById("meaning").innerText=
 words[index][1];


 document.getElementById("count").innerText=
 Number(document.getElementById("count").innerText)+1;

let percent =
(Number(document.getElementById("count").innerText)
/ words.length) * 100;

document.getElementById("bar").style.width =
percent + "%";
}



function showMeaning(){

 document.getElementById("meaning")
 .classList.remove("hidden");


 



function speak(){

 let text=
 document.getElementById("word").innerText;


 let speech=new SpeechSynthesisUtterance(text);

 speech.lang="ko-KR";

 speechSynthesis.speak(speech);

}



</script>


</body>
</html>
